set timeout=3
set default=0

# Enable VESA framebuffer for Oki Desktop Environment
set gfxmode=1024x768x32
set gfxpayload=keep

insmod all_video

menuentry "MonoOS v0.2 -- Dori Kernel + Oki DE" {
    multiboot2 /boot/dori.kernel
    boot
}

menuentry "MonoOS v0.2 -- Text Mode (fallback)" {
    set gfxpayload=text
    multiboot2 /boot/dori.kernel
    boot
}
